# Berkas Konfigurasi Utama Calamares - Edisi Fishing OS
---
modules-search: [ local ]

instances:
  - id:       fishing-grub
    module:   grubcfg
    config:   grubcfg.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - grubcfg@fishing-grub
    - bootloader
    - umount
  - show:
    - finished

branding: fishing-os
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
